
name: PSG Lotto macOS DMG Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:

    # ✅ 1. Checkout code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ✅ 2. Setup Flutter
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    # ✅ 3. Cache dependencies
    - name: Cache pub packages
      uses: actions/cache@v3
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

    # ✅ 4. Precache macOS artifacts
    - name: Precache macOS
      run: flutter precache --macos

    # ✅ 5. Install dependencies
    - name: Install Dependencies
      run: |
        flutter clean
        flutter pub get

    # 🔥 6. FIX CocoaPods (IMPORTANT)
    - name: Fix CocoaPods Setup
      run: |
        cd macos
        rm -rf Pods Podfile.lock
        pod deintegrate || true
        pod install --repo-update
        cd ..

    # ✅ 7. Verify setup
    - name: Verify Flutter Setup
      run: flutter doctor -v

    # ✅ 8. Build macOS app
    - name: Build macOS
      run: flutter build macos --release

    # ✅ 9. Install DMG tool
    - name: Install create-dmg
      run: brew install create-dmg

    # ✅ 10. Create DMG
    - name: Create DMG
      run: |
        APP_PATH=$(find build/macos -name "*.app" | head -n 1)

        echo "App path: $APP_PATH"

        create-dmg \
          --volname "PSGLotto" \
          --window-size 600 400 \
          --icon-size 100 \
          --app-drop-link 450 200 \
         "PSGLotto.dmg" \
         "$APP_PATH"

    # ✅ 11. Upload artifact
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: PSGLotto.dmg
